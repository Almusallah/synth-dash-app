name: keep-dash-awake
# Pings the dashboard's health endpoint so Render's free tier never spins the
# service down. This matters most when the trading worker DIES: the worker's
# own pushes stop, and without this ping the dash (and the 24/7 cloud medic
# thread inside it) would sleep — right when the medic needs to be awake to
# detect the dead worker and restart it. GitHub-hosted, so it runs with the
# laptop off. ~10 min interval stays safely under Render's ~15 min idle limit.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}
jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /api/health (wake dash, keep medic thread alive)
        run: |
          echo "pinging dashboard health endpoint..."
          curl -sS --retry 4 --retry-all-errors --max-time 90 \
            https://synth-dash-app.onrender.com/api/health || true
          echo
